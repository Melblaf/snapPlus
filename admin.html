<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snap+ Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="snap-banner">
                <i class="fab fa-snapchat"></i>
                <h2>Snap+ Admin</h2>
            </div>

            <div class="disclaimer">
                <i class="fas fa-key"></i>
                <p>Entrez le code de vérification à envoyer aux utilisateurs via Discord.</p>
            </div>

            <div class="headline">
                Envoyer un code de vérification 🔐
            </div>

            <div class="form-group">
                <label>Code de vérification</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="text" id="codeInput" placeholder="Entrez le code" maxlength="10">
                </div>
            </div>

            <button class="submit-btn" id="sendCodeBtn">
                <i class="fas fa-paper-plane"></i> Envoyer
            </button>

            <div class="loading-screen" id="loadingScreen">
                <div class="spinner"></div>
                <div class="loading-text">Envoi en cours...</div>
                <div class="loading-subtext">Publication sur Discord</div>
            </div>

            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <h3>Code envoyé !</h3>
                <p>Le code a été publié sur Discord avec @everyone.</p>
            </div>

            <div style="border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;"></div>

            <div class="headline" style="margin-top: 10px;">
                Gestion des IPs 🔒
            </div>

            <div class="form-group">
                <label>IP</label>
                <div class="input-wrapper">
                    <i class="fas fa-globe"></i>
                    <input type="text" id="ipInput" placeholder="Entrez l'IP">
                </div>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="password" id="mdpInput" placeholder="Mot de passe">
                </div>
            </div>

            <button class="submit-btn blacklist-btn" id="blacklistBtn" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);">
                <i class="fas fa-ban"></i> Blacklister
            </button>

            <button class="submit-btn unblacklist-btn" id="unblacklistBtn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4); margin-top: 10px;">
                <i class="fas fa-check"></i> Déblacklister
            </button>

            <div style="margin-top: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1);">
                <h4 style="margin-bottom: 10px; font-size: 14px; color: rgba(255,255,255,0.7);"><i class="fas fa-list"></i> IPs blacklister</h4>
                <div id="blacklistList" style="font-size: 13px; color: rgba(255,255,255,0.6);"></div>
            </div>
        </div>
    </div>

    <script src="discord.js"></script>
    <script src="ip.js"></script>
    <script src="admin.js"></script>
</body>
</html>
