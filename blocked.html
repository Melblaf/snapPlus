<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap+ - Accès refusé</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: 80vh; flex-direction: column; text-align: center;">
            <div style="font-size: 80px; margin-bottom: 20px; animation: bounce 0.6s ease-out;">🚫</div>
            <h1 style="font-size: 24px; margin-bottom: 10px;">Accès refusé</h1>
            <p style="color: rgba(255,255,255,0.6); font-size: 14px; max-width: 300px;">Votre IP a été bloquée. Vous ne pouvez pas accéder à ce site.</p>
            <div style="margin-top: 30px; padding: 12px 20px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; font-size: 12px; color: rgba(255,255,255,0.5);">
                <i class="fas fa-globe" style="margin-right: 6px;"></i> <span id="blockedIP"></span>
            </div>
        </div>
    </div>
    <script>
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => document.getElementById('blockedIP').textContent = d.ip)
            .catch(() => {});
    </script>
</body>
</html>
